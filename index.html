<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIOS - Cuisine Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .column-container { background: rgba(30, 41, 59, 0.3); min-height: 80vh; border-radius: 20px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .order-card { background: white; color: #1e293b; border-radius: 24px; padding: 20px; margin-bottom: 20px; border-left: 10px solid #3b82f6; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .status-processing { border-left-color: #f97316; }
        .status-ready { border-left-color: #22c55e; }
        .pizza-item { background: #f8fafc; border-radius: 12px; padding: 10px 15px; margin-bottom: 8px; border: 1px solid #f1f5f9; }
        .pizza-name { font-weight: 800; text-transform: uppercase; color: #0f172a; font-size: 1rem; }
        .pizza-size { color: #3b82f6; font-weight: 800; font-size: 0.75rem; float: right; background: white; padding: 2px 8px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .special-note { color: #dc2626; font-weight: 900; font-size: 0.8rem; display: block; margin-top: 4px; text-transform: uppercase; border-top: 1px dashed #fecaca; padding-top: 4px; }
        .btn-time { background: #3b82f6; color: white; padding: 12px 0; border-radius: 12px; font-weight: 900; font-size: 1rem; transition: all 0.2s; }
        .order-time { background: #0f172a; color: white; padding: 6px 14px; border-radius: 10px; font-weight: 900; font-size: 16px; }
        .type-badge { font-weight: 900; font-size: 10px; padding: 4px 10px; border-radius: 8px; border: 1.5px solid; }
        .type-livraison { color: #dc2626; border-color: #fecaca; background: #fef2f2; }
        .type-place { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-slate-900 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <img src="SAIOS logo V1.jpg" alt="SAIOS" class="h-6">
            <h1 class="font-black text-sm text-slate-400 uppercase tracking-tighter">Cuisine <span class="text-white">Live</span></h1>
        </div>
        <div class="flex items-center gap-2 bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700">
            <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
            <span class="font-black text-white uppercase text-[10px]">Realtime Active</span>
        </div>
    </header>

    <main class="p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
            <h3 class="text-blue-400 mb-4 font-black flex items-center gap-2 text-xl italic">● À VALIDER <span id="count-pending" class="bg-slate-800 px-3 py-0.5 rounded-full text-sm text-white">0</span></h3>
            <div id="col-pending" class="column-container"></div>
        </div>
        <div>
            <h3 class="text-orange-400 mb-4 font-black flex items-center gap-2 text-xl italic">● EN CUISINE <span id="count-processing" class="bg-slate-800 px-3 py-0.5 rounded-full text-sm text-white">0</span></h3>
            <div id="col-processing" class="column-container"></div>
        </div>
        <div>
            <h3 class="text-green-400 mb-4 font-black flex items-center gap-2 text-xl italic">● PRÊTES <span id="count-ready" class="bg-slate-800 px-3 py-0.5 rounded-full text-sm text-white">0</span></h3>
            <div id="col-ready" class="column-container"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://bhtnjevdjntnzrxaksde.supabase.co";
        const SUPABASE_KEY = "sb_publishable_kJUhaTAw4xBCW0e3f5ketg_n_HcboDn"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function startSystem() { 
            await loadData(); 
            _supabase.channel('orders-db').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadData()).subscribe();
        }

        async function loadData() {
            const { data, error } = await _supabase
                .from('orders')
                .select('*, clients(*)') 
                .neq('status', 'delivered')
                .order('created_at', { ascending: false });
            if (!error) renderUI(data);
        }

        function renderUI(orders) {
            const zones = { 'pending': 'col-pending', 'processing': 'col-processing', 'ready-to-deliver': 'col-ready' };
            const counts = { 'pending': 0, 'processing': 0, 'ready-to-deliver': 0 };
            Object.values(zones).forEach(id => document.getElementById(id).innerHTML = '');
            
            orders.forEach(order => {
                const status = order.status || 'pending';
                if(counts.hasOwnProperty(status)) counts[status]++;

                // Gestion Client Robuste
                let c = order.clients;
                if (Array.isArray(c)) c = c[0];
                const nom = c?.name || "CLIENT";
                const tel = c?.phone_number || "N/A";

                const items = Array.isArray(order.delivery_notes) ? order.delivery_notes : [];
                let itemsHTML = items.map(i => `
                    <div class="pizza-item">
                        <span class="pizza-size">${i.size || 'Grande'}</span>
                        <div class="pizza-name">${i.name}</div>
                        ${i.modifications ? `<span class="special-note">⚠️ ${i.modifications}</span>` : ''}
                    </div>
                `).join('');

                const isLivraison = (order.order_type || "").toLowerCase().includes("livraison");
                const typeHTML = isLivraison 
                    ? `<span class="type-badge type-livraison">🛵 LIVRAISON</span>` 
                    : `<span class="type-badge type-place">🍽️ SUR PLACE</span>`;

                const card = document.createElement('div');
                card.className = `order-card ${status === 'processing' ? 'status-processing' : (status === 'ready-to-deliver' ? 'status-ready' : '')}`;
                
                let btns = status === 'pending' ? `<div class="grid grid-cols-3 gap-3 mt-4"><button onclick="updateStatus('${order.id}', 'processing')" class="btn-time">10M</button><button onclick="updateStatus('${order.id}', 'processing')" class="btn-time">20M</button><button onclick="updateStatus('${order.id}', 'processing')" class="btn-time">30M</button></div>` : (status === 'processing' ? `<button onclick="updateStatus('${order.id}', 'ready-to-deliver')" class="w-full mt-4 bg-orange-500 text-white py-4 rounded-xl font-black uppercase shadow-md">PRÊT ✅</button>` : `<button onclick="updateStatus('${order.id}', 'delivered')" class="w-full mt-4 bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-md">TERMINER</button>`);
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="order-time">${new Date(order.created_at).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}).replace(':', 'h')}</span>
                        <span class="text-2xl font-black text-blue-600">${parseFloat(order.total_price || 0).toFixed(2)}€</span>
                    </div>
                    <div class="mb-4">${itemsHTML}</div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-xs">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-black text-slate-900 uppercase italic">👤 ${nom}</span>
                            ${typeHTML}
                        </div>
                        <div class="text-blue-600 font-extrabold text-sm mb-1">📞 ${tel}</div>
                        <div class="border-t pt-2 mt-1 text-slate-500 font-bold italic">📍 ${order.delivery_street || "À EMPORTER"}</div>
                    </div>
                    ${btns}
                `;
                if (zones[status]) document.getElementById(zones[status]).appendChild(card);
            });
            
            document.getElementById('count-pending').innerText = counts['pending'];
            document.getElementById('count-processing').innerText = counts['processing'];
            document.getElementById('count-ready').innerText = counts['ready-to-deliver'];
        }

        async function updateStatus(id, s) { await _supabase.from('orders').update({ status: s }).eq('id', id); loadData(); }
        startSystem();
    </script>
</body>
</html>
