<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIOS - Cuisine Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .column-container { background: rgba(30, 41, 59, 0.3); min-height: 80vh; border-radius: 20px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .order-card { background: white; color: #1e293b; border-radius: 16px; padding: 15px; margin-bottom: 15px; border-left: 8px solid #3b82f6; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .status-processing { border-left-color: #f97316; }
        .status-ready { border-left-color: #22c55e; }
        .pizza-item { background: #f1f5f9; border-radius: 8px; padding: 6px 10px; margin-bottom: 4px; border-left: 3px solid #3b82f6; }
        .pizza-name { font-weight: 800; text-transform: uppercase; color: #0f172a; font-size: 0.95rem; }
        .special-note { color: #dc2626; font-weight: 900; font-size: 0.75rem; display: block; margin-top: 2px; text-transform: uppercase; border-top: 1px dashed #fecaca; }
        .btn-time { background: #3b82f6; color: white; padding: 8px 0; border-radius: 10px; font-weight: 900; font-size: 0.75rem; }
        .type-badge { font-weight: 900; font-size: 10px; padding: 4px 8px; border-radius: 8px; display: flex; align-items: center; gap: 4px; border: 1.5px solid; }
        .type-livraison { color: #dc2626; border-color: #fecaca; background: #fef2f2; }
        .type-emporter { color: #2563eb; border-color: #bfdbfe; background: #eff6ff; }
        .type-place { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }
        .auth-input { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px; width: 100%; color: #1e293b; font-weight: 600; }
    </style>
</head>
<body>

    <div id="lock-screen" class="fixed inset-0 bg-[#0f172a] z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-[380px] text-center">
            <img src="SAIOS logo V1.jpg" alt="SAIOS" class="w-24 mx-auto mb-10">
            <div class="space-y-4">
                <input type="email" id="email-input" placeholder="Email restaurant" class="auth-input">
                <input type="password" id="pin-input" placeholder="Mot de passe" class="auth-input">
                <button onclick="checkAccess()" class="w-full bg-gradient-to-r from-[#003366] to-[#3b82f6] text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg">Se connecter</button>
            </div>
            <p class="text-slate-400 text-[10px] mt-8 font-bold">POWERED BY SAIOS TECHNOLOGIES</p>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img src="SAIOS logo V1.jpg" alt="SAIOS" class="h-6">
                <h1 class="font-black text-sm text-slate-400 uppercase">Cuisine <span class="text-white">Live</span></h1>
            </div>
            <div class="flex items-center gap-2 bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700">
                <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                <span class="font-black text-white uppercase text-[10px]">REALTIME ACTIVE</span>
            </div>
        </header>

        <main class="p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <h3 class="text-blue-400 mb-4 font-black flex items-center gap-2">À VALIDER <span id="count-pending" class="bg-blue-900/50 px-3 py-1 rounded-full text-sm text-blue-300">0</span></h3>
                <div id="col-pending" class="column-container"></div>
            </div>
            <div>
                <h3 class="text-orange-400 mb-4 font-black flex items-center gap-2">EN CUISINE <span id="count-processing" class="bg-orange-900/50 px-3 py-1 rounded-full text-sm text-orange-300">0</span></h3>
                <div id="col-processing" class="column-container"></div>
            </div>
            <div>
                <h3 class="text-green-400 mb-4 font-black flex items-center gap-2">PRÊTES <span id="count-ready" class="bg-green-900/50 px-3 py-1 rounded-full text-sm text-green-300">0</span></h3>
                <div id="col-ready" class="column-container"></div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://bhtnjevdjntnzrxaksde.supabase.co";
        const SUPABASE_KEY = "sb_publishable_kJUhaTAw4xBCW0e3f5ketg_n_HcboDn"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAccess() {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('pin-input').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (!error) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                startSystem();
            } else { alert("Erreur d'accès"); }
        }

        async function startSystem() { 
            await loadData(); 
            _supabase.channel('orders-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadData()).subscribe();
        }

        async function loadData() {
            // RETOUR AU "clients" simple (sans inner) pour ne pas filtrer les commandes
            const { data, error } = await _supabase
                .from('orders')
                .select('*, clients(*)')
                .neq('status', 'delivered')
                .order('created_at', { ascending: false });

            if (!error) renderUI(data);
        }

        function renderUI(orders) {
            const zones = { 'pending': 'col-pending', 'processing': 'col-processing', 'ready-to-deliver': 'col-ready' };
            const counts = { 'pending': 0, 'processing': 0, 'ready-to-deliver': 0 };
            Object.values(zones).forEach(id => document.getElementById(id).innerHTML = '');
            
            orders.forEach(order => {
                const status = order.status || 'pending';
                if(counts.hasOwnProperty(status)) counts[status]++;

                // Sécurité Client
                let c = order.clients;
                if (Array.isArray(c)) c = c[0];
                const nom = c?.name || c?.nom || "Client";
                const tel = c?.phone_number || c?.telephone || "N/A";

                const type = (order.order_type || "").toLowerCase();
                let typeHTML = type.includes("livraison") ? `<span class="type-badge type-livraison">🛵 LIVRAISON</span>` : (type.includes("emporter") ? `<span class="type-badge type-emporter">🛍️ EMPORTER</span>` : `<span class="type-badge type-place">🍽️ SUR PLACE</span>`);
                
                const card = document.createElement('div');
                card.className = `order-card ${status === 'processing' ? 'status-processing' : (status === 'ready-to-deliver' ? 'status-ready' : '')}`;
                
                let btns = status === 'pending' ? `<div class="grid grid-cols-3 gap-2 mt-3"><button onclick="updateStatus('${order.id}', 'processing')" class="btn-time">10M</button><button onclick="updateStatus('${order.id}', 'processing')" class="btn-time">20M</button><button onclick="updateStatus('${order.id}', 'processing')" class="btn-time">30M</button></div>` : (status === 'processing' ? `<button onclick="updateStatus('${order.id}', 'ready-to-deliver')" class="w-full mt-3 bg-orange-500 text-white py-3 rounded-xl font-black text-xs shadow-md">PRÊT ✅</button>` : `<button onclick="updateStatus('${order.id}', 'delivered')" class="w-full mt-3 bg-green-600 text-white py-3 rounded-xl font-black text-xs shadow-md">TERMINER</button>`);
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b pb-2">
                        <span class="bg-slate-900 text-white px-2 py-1 rounded text-sm font-bold">${new Date(order.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</span>
                        <span class="text-lg font-black text-blue-600">${parseFloat(order.total_price || 0).toFixed(2)}€</span>
                    </div>
                    <div class="mb-3 text-[13px] font-bold text-slate-800">${order.delivery_notes || "Aucun article"}</div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-[11px]">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-black text-slate-900 uppercase">👤 ${nom}</span>
                            ${typeHTML}
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-blue-600 font-black text-[12px]">📞 ${tel}</span>
                            ${tel !== 'N/A' ? `<a href="tel:${tel}" class="bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold uppercase text-[9px]">Appeler</a>` : ''}
                        </div>
                        <div class="border-t pt-1 mt-1 text-slate-600 font-bold italic">📍 ${order.delivery_street || "Boutique"}</div>
                    </div>
                    ${btns}
                `;
                if (document.getElementById(zones[status])) document.getElementById(zones[status]).appendChild(card);
            });
            
            document.getElementById('count-pending').innerText = counts['pending'];
            document.getElementById('count-processing').innerText = counts['processing'];
            document.getElementById('count-ready').innerText = counts['ready-to-deliver'];
        }

        async function updateStatus(id, s) { await _supabase.from('orders').update({ status: s }).eq('id', id); loadData(); }
    </script>
</body>
</html>
