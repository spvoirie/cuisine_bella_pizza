<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIOS - Cuisine Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .column-container { min-height: 85vh; border-radius: 20px; padding: 12px; }
        .order-card { background: white; color: #1e293b; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-left: 12px solid #3b82f6; }
        .status-processing { border-left-color: #f97316; }
        .status-ready { border-left-color: #22c55e; }
        .pizza-item { border-bottom: 1px dashed #e2e8f0; padding: 10px 0; }
        .pizza-item:last-child { border-bottom: none; }
        .pizza-name { font-weight: 900; text-transform: uppercase; color: #0f172a; font-size: 1.1rem; }
        .special-note { color: #dc2626; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-top: 4px; display: block; }
        .btn-time { background: #3b82f6; color: white; padding: 12px 0; border-radius: 12px; font-weight: 900; font-size: 1rem; }
        .type-badge { font-weight: 900; font-size: 10px; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; }
        .type-livraison { background: #fee2e2; color: #ef4444; }
        .type-place { background: #dcfce7; color: #22c55e; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="SAIOS logo V1.jpg" alt="SAIOS" class="h-8">
            <h1 class="font-black text-xl uppercase tracking-tighter">Cuisine <span class="text-slate-500">Live</span></h1>
        </div>
        <div id="status-indicator" class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
            <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
            <span class="font-black text-white uppercase text-xs">Realtime Active</span>
        </div>
    </header>

    <main class="p-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
            <div class="flex items-center gap-3 mb-6">
                <div class="w-4 h-4 bg-blue-500 rounded-full"></div>
                <h2 class="text-3xl font-black uppercase italic">À Valider</h2>
                <span id="count-pending" class="bg-slate-800 px-4 py-1 rounded-full text-xl font-black">0</span>
            </div>
            <div id="col-pending" class="column-container bg-slate-900/40"></div>
        </div>

        <div>
            <div class="flex items-center gap-3 mb-6">
                <div class="w-4 h-4 bg-orange-500 rounded-full"></div>
                <h2 class="text-3xl font-black uppercase italic text-orange-500">En Cuisine</h2>
                <span id="count-processing" class="bg-slate-800 px-4 py-1 rounded-full text-xl font-black text-orange-500">0</span>
            </div>
            <div id="col-processing" class="column-container bg-slate-900/40 border border-orange-500/10"></div>
        </div>

        <div>
            <div class="flex items-center gap-3 mb-6">
                <div class="w-4 h-4 bg-green-500 rounded-full"></div>
                <h2 class="text-3xl font-black uppercase italic text-green-500">Prêtes</h2>
                <span id="count-ready" class="bg-slate-800 px-4 py-1 rounded-full text-xl font-black text-green-500">0</span>
            </div>
            <div id="col-ready" class="column-container bg-slate-900/40 border border-green-500/10"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://bhtnjevdjntnzrxaksde.supabase.co";
        const SUPABASE_KEY = "sb_publishable_kJUhaTAw4xBCW0e3f5ketg_n_HcboDn"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function startSystem() { 
            await loadData(); 
            _supabase.channel('custom-all-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadData()).subscribe();
        }

        async function loadData() {
            const { data, error } = await _supabase
                .from('orders')
                .select('*, clients(*)') // Jointure simple
                .neq('status', 'delivered')
                .order('created_at', { ascending: false });

            if (!error) renderUI(data);
        }

        function renderUI(orders) {
            const zones = { 'pending': 'col-pending', 'processing': 'col-processing', 'ready-to-deliver': 'col-ready' };
            const counts = { 'pending': 0, 'processing': 0, 'ready-to-deliver': 0 };
            Object.values(zones).forEach(id => document.getElementById(id).innerHTML = '');
            
            orders.forEach(order => {
                const status = order.status || 'pending';
                if(counts.hasOwnProperty(status)) counts[status]++;

                // --- RECUPERATION CLIENT (CORRIGÉ) ---
                let client = order.clients;
                if (Array.isArray(client)) client = client[0]; // Sécurité Supabase
                const nomClient = client?.name || "CLIENT";
                const telClient = client?.phone_number || "📞 N/A";

                const items = Array.isArray(order.delivery_notes) ? order.delivery_notes : [];
                let itemsHTML = items.map(item => `
                    <div class="pizza-item">
                        <div class="flex justify-between items-start">
                            <span class="pizza-name">${item.name}</span>
                            <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px] font-bold">${item.size || 'Grande'}</span>
                        </div>
                        ${item.modifications ? `<span class="special-note">⚠️ ${item.modifications}</span>` : ''}
                    </div>
                `).join('');

                const typeHTML = (order.order_type || "").toLowerCase().includes('livraison') 
                    ? `<span class="type-badge type-livraison">🛵 Livraison</span>` 
                    : `<span class="type-badge type-place">🍽️ Sur Place</span>`;

                const card = document.createElement('div');
                card.className = `order-card ${status === 'processing' ? 'status-processing' : (status === 'ready-to-deliver' ? 'status-ready' : '')}`;
                
                let actionBtns = "";
                if (status === 'pending') {
                    actionBtns = `<div class="grid grid-cols-3 gap-3 mt-6">
                        <button onclick="updateStatus('${order.id}', 'processing')" class="btn-time shadow-lg shadow-blue-200">10M</button>
                        <button onclick="updateStatus('${order.id}', 'processing')" class="btn-time shadow-lg shadow-blue-200">20M</button>
                        <button onclick="updateStatus('${order.id}', 'processing')" class="btn-time shadow-lg shadow-blue-200">30M</button>
                    </div>`;
                } else if (status === 'processing') {
                    actionBtns = `<button onclick="updateStatus('${order.id}', 'ready-to-deliver')" class="w-full mt-6 bg-orange-500 text-white py-4 rounded-2xl font-black text-xl shadow-lg shadow-orange-200 uppercase">Prêt ✅</button>`;
                } else {
                    actionBtns = `<button onclick="updateStatus('${order.id}', 'delivered')" class="w-full mt-6 bg-green-500 text-white py-4 rounded-2xl font-black text-xl shadow-lg shadow-green-200 uppercase tracking-widest">Terminer</button>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-slate-900 text-white px-3 py-1 rounded-lg font-black text-lg">${new Date(order.created_at).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}).replace(':', 'h')}</span>
                        <span class="text-2xl font-black text-blue-600">${parseFloat(order.total_price || 0).toFixed(2)}€</span>
                    </div>
                    
                    <div class="space-y-1 mb-6">${itemsHTML}</div>

                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-black text-slate-900 flex items-center gap-2 italic">👤 ${nomClient}</span>
                            ${typeHTML}
                        </div>
                        <div class="text-blue-600 font-black text-sm mb-2">📞 ${telClient}</div>
                        <div class="text-slate-500 font-bold text-xs border-t pt-2 uppercase tracking-tighter">📍 ${order.delivery_street || "À EMPORTER"}</div>
                    </div>

                    ${actionBtns}
                `;
                
                if (zones[status]) document.getElementById(zones[status]).appendChild(card);
            });

            document.getElementById('count-pending').innerText = counts['pending'];
            document.getElementById('count-processing').innerText = counts['processing'];
            document.getElementById('count-ready').innerText = counts['ready-to-deliver'];
        }

        async function updateStatus(id, s) { await _supabase.from('orders').update({ status: s }).eq('id', id); loadData(); }

        startSystem();
    </script>
</body>
</html>
